<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS2 OPL - Monte seu Pendrive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ff6b35;
        }

        .pendrive-selector {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .pendrive-btn {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: #0f3460;
            color: white;
        }

        .pendrive-btn.active {
            background: #ff6b35;
            transform: scale(1.05);
        }

        .info-bar {
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 30px;
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4ecdc4;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .space-info {
            font-size: 18px;
            font-weight: bold;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-5px);
        }

        .game-card.selected {
            border: 3px solid #4ecdc4;
        }

        .game-cover {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #0f3460;
        }

        .game-info {
            padding: 12px;
        }

        .game-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .game-size {
            font-size: 12px;
            color: #4ecdc4;
        }

        .select-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4ecdc4;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff6b35;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .game-cover {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Monte seu Pendrive PS2 OPL</h1>
        
        <div class="pendrive-selector">
            <button class="pendrive-btn" onclick="selectPendrive(32)">32GB Pendrive</button>
            <button class="pendrive-btn" onclick="selectPendrive(64)">64GB Pendrive</button>
        </div>

        <div class="info-bar">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="space-info">
                📀 <span id="usedSpace">0</span> MB / <span id="totalSpace">0</span> MB
            </div>
            <div>
                🎮 <span id="gameCount">0</span> jogos selecionados
            </div>
        </div>

        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <div id="alert" class="alert"></div>

    <script>
        // Lista de jogos (substitua pela sua lista real)
        const jogos = [
            { nome: "God of War II", tamanhoMB: 4500, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=God+of+War+2" },
            { nome: "Shadow of the Colossus", tamanhoMB: 1200, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=Shadow+Colossus" },
            { nome: "Final Fantasy X", tamanhoMB: 3800, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=Final+Fantasy+X" },
            { nome: "Dragon Ball Budokai Tenkaichi 3", tamanhoMB: 2800, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=DBZ+BT+3" },
            { nome: "Resident Evil 4", tamanhoMB: 2200, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=RE+4" },
            { nome: "GTA San Andreas", tamanhoMB: 3900, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=GTA+SA" },
            { nome: "Metal Gear Solid 3", tamanhoMB: 3500, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=MGS+3" },
            { nome: "Kingdom Hearts II", tamanhoMB: 3200, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=Kingdom+Hearts+2" },
            { nome: "Black", tamanhoMB: 2900, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=Black" },
            { nome: "Need for Speed Most Wanted", tamanhoMB: 2100, capa: "https://via.placeholder.com/300x250/0f3460/fff?text=NFS+MW" }
        ];

        let selectedPendrive = 32; // GB
        let selectedGames = [];
        
        // Capacidades em MB (considerando espaço real do pendrive)
        const capacities = {
            32: 29000, // ~29GB utilizável
            64: 58000  // ~58GB utilizável
        };

        function selectPendrive(size) {
            selectedPendrive = size;
            selectedGames = [];
            updateUI();
            
            // Atualizar botões ativos
            document.querySelectorAll('.pendrive-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function toggleGame(game) {
            const gameIndex = selectedGames.findIndex(g => g.nome === game.nome);
            const currentTotal = getTotalSize();
            
            if (gameIndex === -1) {
                // Adicionar jogo
                if (currentTotal + game.tamanhoMB <= capacities[selectedPendrive]) {
                    selectedGames.push(game);
                    showAlert(`✅ ${game.nome} adicionado!`, 'success');
                } else {
                    showAlert(`⚠️ Espaço insuficiente para ${game.nome}!`, 'error');
                }
            } else {
                // Remover jogo
                selectedGames.splice(gameIndex, 1);
                showAlert(`❌ ${game.nome} removido!`, 'info');
            }
            
            updateUI();
        }

        function getTotalSize() {
            return selectedGames.reduce((total, game) => total + game.tamanhoMB, 0);
        }

        function updateUI() {
            const totalSize = getTotalSize();
            const capacity = capacities[selectedPendrive];
            const percentage = (totalSize / capacity) * 100;
            
            // Atualizar progress bar
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = `${percentage}%`;
            progressFill.textContent = `${Math.round(percentage)}%`;
            
            // Mudar cor da barra quando próximo do limite
            if (percentage > 90) {
                progressFill.style.background = '#ff6b35';
            } else if (percentage > 70) {
                progressFill.style.background = '#ffd93d';
            } else {
                progressFill.style.background = '#4ecdc4';
            }
            
            // Atualizar informações de espaço
            document.getElementById('usedSpace').textContent = totalSize;
            document.getElementById('totalSpace').textContent = capacity;
            document.getElementById('gameCount').textContent = selectedGames.length;
            
            // Atualizar grid de jogos
            renderGamesGrid();
        }
        
        function renderGamesGrid() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';
            
            jogos.forEach(game => {
                const isSelected = selectedGames.some(g => g.nome === game.nome);
                const card = document.createElement('div');
                card.className = `game-card ${isSelected ? 'selected' : ''}`;
                card.onclick = () => toggleGame(game);
                
                card.innerHTML = `
                    <img class="game-cover" src="${game.capa}" alt="${game.nome}">
                    <div class="game-info">
                        <div class="game-title">${game.nome}</div>
                        <div class="game-size">${game.tamanhoMB} MB</div>
                    </div>
                    ${isSelected ? '<div class="select-indicator">✓</div>' : ''}
                `;
                
                grid.appendChild(card);
            });
        }
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
            
            if (type === 'error') {
                alertDiv.style.background = '#e74c3c';
            } else if (type === 'success') {
                alertDiv.style.background = '#2ecc71';
            } else {
                alertDiv.style.background = '#3498db';
            }
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 2000);
        }
        
        // Inicializar
        selectPendrive(32);
        
        // Botão para finalizar seleção e gerar pedido
        const finishBtn = document.createElement('button');
        finishBtn.textContent = '🛒 Finalizar Seleção';
        finishBtn.style.cssText = `
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        `;
        
        finishBtn.onclick = () => {
            if (selectedGames.length === 0) {
                showAlert('⚠️ Selecione pelo menos um jogo!', 'error');
                return;
            }
            
            const gamesList = selectedGames.map(g => g.nome).join('\n');
            const message = `Olá! Gostaria de comprar um pendrive de ${selectedPendrive}GB com os seguintes jogos:\n\n${gamesList}\n\nTotal: ${getTotalSize()}MB / ${capacities[selectedPendrive]}MB`;
            
            // Link para WhatsApp da loja (substitua pelo seu número)
            const whatsappLink = `https://wa.me/5511999999999?text=${encodeURIComponent(message)}`;
            window.open(whatsappLink, '_blank');
        };
        
        document.body.appendChild(finishBtn);
    </script>
</body>
</html>
